ative"><!-- Topbar --><div class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/50 backdrop-blur sticky top-0 z-10"><div class="flex items-center gap-4 flex-1"><!-- Omni Input --><div class="relative w-full max-w-2xl group"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="w-5 h-5 text-slate-500 group-focus-within:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div><input type="text" class="w-full bg-slate-800/50 border border-slate-700 text-slate-200 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block pl-10 pr-12 py-2.5 transition-all placeholder-slate-500" placeholder="Paste text, search, or enter a URL..." style=""><div class="absolute inset-y-0 right-0 flex items-center pr-2"><span class="text-xs text-slate-500 border border-slate-700 rounded px-1.5 py-0.5 bg-slate-800">↵</span></div></div></div><div class="flex items-center gap-3"><select class="bg-slate-800 border border-slate-700 text-slate-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2"><option value="date">Sort by Date</option><option value="name">Sort by Name</option></select><div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700"><button class="p-1.5 rounded transition-colors bg-slate-700 text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></button><button class="p-1.5 rounded transition-colors text-slate-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button></div></div></div><!-- Main Feed (Grid View) --><div class="flex-1 overflow-y-auto p-6"><div class="flex flex-col items-center justify-center h-64 text-slate-500"><svg class="w-16 h-16 mb-4 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg><p class="text-lg">No items here yet</p><p class="text-sm mt-1">Paste text, drag files, or use the omnibar above.</p></div></div><!-- Toast Notification --><!--v-if--></div></a></div><a href="/" class="text-white font-bold text-lg flex items-center gap-2"><!-- Universal Viewer / Editor Overlay --><!--v-if--></a></div><a href="/" class="text-white font-bold text-lg flex items-center gap-2">


    <script>
        window.csrfToken = "rGfxMjQE7oB1UV6di-CgxAKIXeIuZKi2VTrp8Tf6Gxg";
        window.username = "admin";

        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    items: [],
                    loading: true,
                    omniInput: '',
                    toastMessage: '',
                    activeItem: null,
                    isDragging: false,
                    viewMode: 'grid', // 'grid' | 'canvas'
                    currentFilter: 'all', // 'all' | 'file' | 'note' | 'html'
                    sortBy: 'date', // 'date' | 'name'

                    // Inline Edit
                    editingId: null,
                    editContent: '',

                    // Canvas state
                    isPanning: false,
                    startX: 0, startY: 0,
                    canvasX: 0, canvasY: 0,
                }
            },
            computed: {
                filteredItems() {
                    let result = this.items;

                    if (this.currentFilter !== 'all') {
                        result = result.filter(i => i.type === this.currentFilter);
                    }

                    result = result.sort((a, b) => {
                        if (this.sortBy === 'name') {
                            return a.title.localeCompare(b.title);
                        } else {
                            // Date sort (newest first)
                            return new Date(b.updated || 0) - new Date(a.updated || 0);
                        }
                    });

                    return result;
                }
            },
            mounted() {
                this.fetchItems();

                // Add keyboard shortcut for search/omnibar
                document.addEventListener('keydown', (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                        e.preventDefault();
                        const input = document.querySelector('input[type="text"]');
                        if (input) input.focus();
                    }
                });
            },
            methods: {
                async fetchItems() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/items');
                        const data = await res.json();
                        if (data.ok) {
                            this.items = data.items;
                        }
                    } catch (e) {
                        console.error('Failed to fetch items', e);
                        this.showToast('Failed to load workspace.');
                    }
                    this.loading = false;
                },

                async submitOmni() {
                    const text = this.omniInput.trim();
                    if (!text) return;

                    const tempId = 'temp-' + Date.now();
                    this.items.unshift({
                        id: tempId,
                        type: 'note',
                        title: text.substring(0, 30) + '...',
                        content: text,
                        updated: new Date().toISOString(),
                        owner: window.username
                    });
                    this.omniInput = '';

                    try {
                        const res = await fetch('/api/add', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': window.csrfToken
                            },
                            body: JSON.stringify({ text })
                        });
                        const data = await res.json();
                        if (data.ok) {
                            this.showToast('Saved!');
                            this.fetchItems();
                        } else {
                            this.showToast('Error: ' + data.error);
                            this.items = this.items.filter(i => i.id !== tempId);
                        }
                    } catch (e) {
                        this.showToast('Failed to save.');
                        this.items = this.items.filter(i => i.id !== tempId);
                    }
                },

                // Inline Editing
                startEdit(item) {
                    if (item.type !== 'note') return;
                    this.editingId = item.id;
                    this.editContent = item.content;
                },
                async saveEdit(item) {
                    if (this.editingId !== item.id) return;

                    const newContent = this.editContent.trim();
                    this.editingId = null;

                    if (newContent === item.content) return;

                    const oldContent = item.content;
                    item.content = newContent; // Optimistic

                    try {
                        const res = await fetch('/api/edit', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': window.csrfToken
                            },
                            body: JSON.stringify({ id: item.id, type: item.type, content: newContent })
                        });
                        const data = await res.json();
                        if (data.ok) {
                            this.showToast('Updated note');
                        } else {
                            item.content = oldContent;
                            this.showToast('Failed to update note.');
                        }
                    } catch (e) {
                        item.content = oldContent;
                        this.showToast('Failed to update note.');
                    }
                },

                // Drag and Drop
                handleDragEnter(e) { this.isDragging = true; },
                handleDragLeave(e) {
                    if (e.clientX === 0 || e.clientY === 0) {
                        this.isDragging = false;
                    }
                },
                async handleDrop(e) {
                    this.isDragging = false;
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        await this.uploadFiles(files);
                    } else {
                        const text = e.dataTransfer.getData('text');
                        if (text) {
                            this.omniInput = text;
                            this.submitOmni();
                        }
                    }
                },

                async handlePaste(e) {
                    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;

                    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                    for (let index in items) {
                        const item = items[index];
                        if (item.kind === 'file') {
                            const blob = item.getAsFile();
                            if (blob) {
                                await this.uploadFiles([blob]);
                                return;
                            }
                        }
                    }

                    const text = (e.clipboardData || window.clipboardData).getData('text');
                    if (text && !this.activeItem && !this.editingId) {
                        this.omniInput = text;
                        this.submitOmni();
                    }
                },

                async uploadFiles(filesList) {
                    const formData = new FormData();
                    for (let i = 0; i < filesList.length; i++) {
                        formData.append('file', filesList[i]);
                    }

                    this.showToast('Uploading...');
                    try {
                        const res = await fetch('/api/add', {
                            method: 'POST',
                            headers: { 'X-CSRFToken': window.csrfToken },
                            body: formData
                        });
                        const data = await res.json();
                        if (data.ok) {
                            this.showToast('Files uploaded!');
                            this.fetchItems();
                        } else {
                            this.showToast('Upload failed: ' + data.error);
                        }
                    } catch (e) {
                        this.showToast('Upload failed.');
                    }
                },

                async deleteItem(item) {
                    // Quick check so we don't accidentally click it
                    if (!confirm(`Delete ${item.title}?`)) return;

                    const oldItems = [...this.items];
                    this.items = this.items.filter(i => i.id !== item.id); // Optimistic

                    try {
                        const res = await fetch('/api/delete', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': window.csrfToken
                            },
                            body: JSON.stringify({ id: item.id, type: item.type })
                        });
                        const data = await res.json();
                        if (data.ok) {
                            this.showToast('Deleted');
                        } else {
                            this.items = oldItems;
                            this.showToast('Failed to delete.');
                        }
                    } catch (e) {
                        this.items = oldItems;
                        this.showToast('Failed to delete.');
                    }
                },

                downloadItem(item) {
                    if (item.url) window.open(item.url, '_blank');
                },

                openItem(item) {
                    this.activeItem = item;
                    if (this.$refs.viewerWrapper) this.$refs.viewerWrapper.focus();
                },
                closeViewer() {
                    this.activeItem = null;
                },

                // Canvas logic
                startCanvasPan(e) {
                    if (e.target.closest('.canvas-node')) return;
                    this.isPanning = true;
                    this.startX = e.clientX - this.canvasX;
                    this.startY = e.clientY - this.canvasY;
                },
                panCanvas(e) {
                    if (!this.isPanning) return;
                    this.canvasX = e.clientX - this.startX;
                    this.canvasY = e.clientY - this.startY;
                },
                endCanvasPan() {
                    this.isPanning = false;
                },
                startNodeDrag(e, item) {
                    let el = e.currentTarget;
                    let startX = e.clientX;
                    let startY = e.clientY;
                    let initLeft = parseInt(el.style.left || 0);
                    let initTop = parseInt(el.style.top || 0);

                    const onMove = (ev) => {
                        el.style.left = (initLeft + ev.clientX - startX) + 'px';
                        el.style.top = (initTop + ev.clientY - startY) + 'px';
                    };
                    const onEnd = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onEnd);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onEnd);
                },

                showToast(msg) {
                    this.toastMessage = msg;
                    setTimeout(() => { this.toastMessage = ''; }, 3000);
                },
                formatSize(bytes) {
                    if (!bytes) return '0 B';
                    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
                },
                formatDate(isoString) {
                    if (!isoString) return '';
                    const d = new Date(isoString);
                    if (isNaN(d.getTime())) return isoString;
                    return d.toLocaleDateString();
                }
            }
        }).mount('#app')
    </script>
