<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>iPad Mermaid Viewer · Dropper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <style>
      body,
      #viewer-app,
      #canvas-wrapper {
        touch-action: none;
      }

      .pseudo-fullscreen {
        position: fixed;
        inset: 0;
        z-index: 99999;
      }

      .loading-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(2, 6, 23, 0.6);
        backdrop-filter: blur(2px);
      }

      .loading-overlay.is-visible {
        display: flex;
      }

      .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid rgba(148, 163, 184, 0.45);
        border-top-color: #f8fafc;
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <main id="viewer-app" class="relative min-h-screen bg-slate-900">
      <div class="mx-auto flex min-h-screen w-full max-w-7xl flex-col p-3 sm:p-4">
        <header class="mb-3 flex flex-wrap items-center justify-between gap-3 rounded-2xl bg-slate-800/90 px-3 py-3 shadow-lg">
          <div>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Dropper · HTML area</p>
            <h1 class="text-lg font-semibold sm:text-xl">Full-screen iPad Mermaid Viewer</h1>
          </div>
          <div class="flex items-center gap-2">
            <a
              href="{% if is_admin %}{{ url_for('html_page', owner=selected_owner) }}{% else %}{{ url_for('html_page') }}{% endif %}"
              class="inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-xl bg-slate-700 px-4 text-sm font-medium hover:bg-slate-600"
              >Back</a
            >
            <button
              id="fullscreen-toggle"
              type="button"
              class="inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-xl bg-indigo-600 px-4 text-sm font-semibold hover:bg-indigo-500"
            >
              Expand
            </button>
          </div>
        </header>

        <section class="mb-3 flex flex-wrap gap-2" id="tab-list" role="tablist" aria-label="Diagram tabs"></section>

        <section class="relative flex-1 overflow-hidden rounded-2xl border border-slate-700 bg-slate-950">
          <div id="canvas-wrapper" class="relative h-full min-h-[60vh] w-full overflow-hidden"></div>
          <div id="loading-overlay" class="loading-overlay is-visible" aria-live="polite" aria-busy="true">
            <div class="spinner" role="status" aria-label="Loading chart"></div>
          </div>

          <div class="pointer-events-none absolute bottom-4 right-4 z-20 flex flex-col gap-2">
            <button
              id="zoom-in"
              type="button"
              class="pointer-events-auto inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-full bg-slate-200 px-4 text-xl font-bold text-slate-900 shadow"
              aria-label="Zoom in"
            >
              +
            </button>
            <button
              id="zoom-out"
              type="button"
              class="pointer-events-auto inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-full bg-slate-200 px-4 text-xl font-bold text-slate-900 shadow"
              aria-label="Zoom out"
            >
              −
            </button>
            <button
              id="zoom-reset"
              type="button"
              class="pointer-events-auto inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-full bg-slate-200 px-4 text-xs font-semibold uppercase tracking-wide text-slate-900 shadow"
            >
              Reset
            </button>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

      const viewerApp = document.getElementById("viewer-app");
      const tabList = document.getElementById("tab-list");
      const canvasWrapper = document.getElementById("canvas-wrapper");
      const loadingOverlay = document.getElementById("loading-overlay");
      const fullscreenToggle = document.getElementById("fullscreen-toggle");
      const zoomInButton = document.getElementById("zoom-in");
      const zoomOutButton = document.getElementById("zoom-out");
      const zoomResetButton = document.getElementById("zoom-reset");

      const diagrams = [
        {
          id: "architecture",
          label: "Architecture",
          code: `flowchart LR
            Client[iPad Safari] --> UI[Viewer UI]
            UI --> Mermaid[Mermaid Render]
            Mermaid --> SVG[SVG Canvas]
            SVG --> Gestures[Hammer.js Gestures]
            Gestures --> PanZoom[svg-pan-zoom]
          `,
        },
        {
          id: "sequence",
          label: "Sequence",
          code: `sequenceDiagram
            participant U as User
            participant T as Tab Controller
            participant M as Mermaid
            participant P as PanZoom
            U->>T: Tap tab
            T->>M: JIT mermaid.render()
            M-->>T: SVG markup
            T->>P: init svg-pan-zoom
            U->>P: pinch/pan gestures
          `,
        },
        {
          id: "state",
          label: "States",
          code: `stateDiagram-v2
            [*] --> Loading
            Loading --> Rendering: diagram selected
            Rendering --> Interactive: SVG mounted
            Interactive --> Rendering: tab switch
            Interactive --> Fullscreen: expand tapped
            Fullscreen --> Interactive: collapse tapped
          `,
        },
      ];

      let activeTabId = diagrams[0].id;
      let panZoomInstance = null;

      mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "dark" });

      function showLoading(show) {
        loadingOverlay.classList.toggle("is-visible", show);
      }

      function teardownPanZoom() {
        if (panZoomInstance) {
          panZoomInstance.destroy();
          panZoomInstance = null;
        }
      }

      function buildTabButton(diagram) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.tabId = diagram.id;
        button.role = "tab";
        button.className =
          "inline-flex min-h-[44px] min-w-[44px] items-center justify-center rounded-xl border border-slate-600 px-4 text-sm font-medium text-slate-100 hover:border-slate-300";
        button.textContent = diagram.label;
        button.addEventListener("click", () => {
          if (activeTabId === diagram.id) return;
          activeTabId = diagram.id;
          renderTabs();
          renderActiveDiagram();
        });
        return button;
      }

      function renderTabs() {
        tabList.replaceChildren(...diagrams.map((diagram) => buildTabButton(diagram)));
        for (const button of tabList.querySelectorAll("button")) {
          const isActive = button.dataset.tabId === activeTabId;
          button.setAttribute("aria-selected", String(isActive));
          button.classList.toggle("bg-indigo-600", isActive);
          button.classList.toggle("border-indigo-500", isActive);
        }
      }

      function initializePanZoom(svgElement) {
        teardownPanZoom();

        panZoomInstance = svgPanZoom(svgElement, {
          zoomEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          minZoom: 0.4,
          maxZoom: 12,
          customEventsHandler: {
            init(options) {
              this.hammer = new Hammer(options.svgElement);
              this.hammer.get("pinch").set({ enable: true });
              this.hammer.get("pan").set({ direction: Hammer.DIRECTION_ALL, threshold: 0 });

              let previousScale = 1;
              this.hammer.on("pinchstart", () => {
                previousScale = 1;
              });

              this.hammer.on("pinchmove", (event) => {
                const rect = options.svgElement.getBoundingClientRect();
                const point = { x: event.center.x - rect.left, y: event.center.y - rect.top };
                const zoomFactor = event.scale / previousScale;
                previousScale = event.scale;
                panZoomInstance.zoomAtPointBy(zoomFactor, point);
              });

              let lastDelta = { x: 0, y: 0 };
              this.hammer.on("panstart", () => {
                lastDelta = { x: 0, y: 0 };
              });

              this.hammer.on("panmove", (event) => {
                const delta = {
                  x: event.deltaX - lastDelta.x,
                  y: event.deltaY - lastDelta.y,
                };
                lastDelta = { x: event.deltaX, y: event.deltaY };
                panZoomInstance.panBy(delta);
              });
            },
            destroy() {
              if (this.hammer) {
                this.hammer.destroy();
                this.hammer = null;
              }
            },
          },
        });
      }

      async function renderActiveDiagram() {
        const diagram = diagrams.find((item) => item.id === activeTabId);
        if (!diagram) return;

        showLoading(true);
        teardownPanZoom();
        canvasWrapper.innerHTML = "";

        try {
          const renderId = `diagram-${diagram.id}-${Date.now()}`;
          const { svg } = await mermaid.render(renderId, diagram.code);
          canvasWrapper.innerHTML = svg;
          const svgElement = canvasWrapper.querySelector("svg");
          if (!svgElement) {
            throw new Error("Diagram render did not return an SVG element.");
          }

          svgElement.style.width = "100%";
          svgElement.style.height = "100%";
          svgElement.setAttribute("preserveAspectRatio", "xMidYMid meet");
          initializePanZoom(svgElement);
          panZoomInstance.fit();
          panZoomInstance.center();
        } catch (error) {
          canvasWrapper.innerHTML = `<p class="p-4 text-sm text-red-300">Unable to render Mermaid diagram: ${error.message}</p>`;
        } finally {
          showLoading(false);
        }
      }

      fullscreenToggle.addEventListener("click", () => {
        const isFullscreen = viewerApp.classList.toggle("pseudo-fullscreen");
        fullscreenToggle.textContent = isFullscreen ? "Collapse" : "Expand";
        requestAnimationFrame(() => {
          if (panZoomInstance) {
            panZoomInstance.resize();
            panZoomInstance.fit();
            panZoomInstance.center();
          }
        });
      });

      zoomInButton.addEventListener("click", () => panZoomInstance?.zoomIn());
      zoomOutButton.addEventListener("click", () => panZoomInstance?.zoomOut());
      zoomResetButton.addEventListener("click", () => {
        if (!panZoomInstance) return;
        panZoomInstance.resetZoom();
        panZoomInstance.center();
        panZoomInstance.fit();
      });

      window.addEventListener("resize", () => {
        if (!panZoomInstance) return;
        panZoomInstance.resize();
        panZoomInstance.fit();
        panZoomInstance.center();
      });

      renderTabs();
      await renderActiveDiagram();
    </script>
  </body>
</html>
