<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HTML Studio · Dropper</title>
    <script>
      (function () {
        try {
          document.documentElement.dataset.interface = localStorage.getItem("dropper-interface") || "clean";
          document.documentElement.dataset.tone = localStorage.getItem("dropper-tone") || "dark";
          document.documentElement.dataset.palette = localStorage.getItem("dropper-palette") || "mono";
        } catch (_error) {}
      })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #020617;
        color: #f8fafc;
        overflow: hidden;
      }

      .app-container {
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      /* Sidebar */
      .sidebar {
        width: 320px;
        background-color: rgba(15, 23, 42, 0.95);
        border-right: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 20;
      }

      .sidebar.hidden {
        transform: translateX(-100%);
        position: absolute;
      }

      .sidebar-header {
        padding: 1.25rem 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(2, 6, 23, 0.5);
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }

      .file-item {
        padding: 0.875rem 1rem;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 0.5rem;
        background-color: rgba(30, 41, 59, 0.3);
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
      }

      .file-item:hover {
        background-color: rgba(30, 41, 59, 0.6);
        border-color: rgba(255,255,255,0.1);
      }

      .file-item.active {
        border-color: rgba(217, 70, 239, 0.3);
        background-color: rgba(217, 70, 239, 0.1);
      }

      .file-item-title {
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 0.375rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #f1f5f9;
      }

      .file-item-meta {
        font-size: 0.75rem;
        color: #94a3b8;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .btn-delete-file {
        color: #fb7185;
        background: rgba(225, 29, 72, 0.1);
        border: 1px solid transparent;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 0.375rem;
        font-size: 0.7rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-delete-file:hover {
        background: rgba(225, 29, 72, 0.2);
        border-color: rgba(225, 29, 72, 0.3);
      }

      /* Main Content Area */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        min-width: 0;
      }

      .top-bar {
        height: 64px;
        background-color: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        padding: 0 1.25rem;
        gap: 1rem;
        z-index: 10;
      }

      .workspace-area {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* Editor Panel */
      .editor-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgba(255,255,255,0.05);
        background-color: #0f172a;
      }

      .editor-panel.hidden {
        display: none;
      }

      .CodeMirror {
        flex: 1;
        height: auto;
        font-size: 14px;
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        line-height: 1.6;
      }

      .CodeMirror-gutters {
        background-color: #0f172a;
        border-right: 1px solid rgba(255,255,255,0.05);
      }

      /* Preview Panel */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: #ffffff;
        position: relative;
      }

      .preview-panel.hidden {
        display: none;
      }

      .preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background-color: #ffffff;
      }

      /* Drawing Overlay */
      .drawing-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      .drawing-canvas.active {
        pointer-events: auto;
      }

      /* Floating Toolbar */
      .floating-toolbar {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        padding: 0.5rem;
        border-radius: 9999px;
        display: flex;
        gap: 0.5rem;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
        z-index: 30;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .floating-toolbar.visible {
        opacity: 1;
        pointer-events: auto;
      }

      /* Presentation Mode */
      .presentation-mode .sidebar {
        display: none;
      }

      .presentation-mode .top-bar {
        display: none;
      }

      .presentation-mode .editor-panel {
        display: none;
      }

      .presentation-mode .floating-toolbar {
        opacity: 1;
        pointer-events: auto;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        gap: 0.5rem;
      }

      .btn-primary {
        background: linear-gradient(135deg, #d946ef 0%, #c026d3 100%);
        color: white;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 4px 12px -2px rgba(217, 70, 239, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px -2px rgba(217, 70, 239, 0.4);
      }

      .btn-primary:active {
        transform: translateY(1px);
      }

      .btn-secondary {
        background-color: rgba(30, 41, 59, 0.8);
        color: #f1f5f9;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .btn-secondary:hover {
        background-color: rgba(51, 65, 85, 0.8);
      }

      .btn-icon {
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 0.5rem;
        background-color: transparent;
        color: #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .btn-icon:hover {
        background-color: rgba(255,255,255,0.1);
        color: white;
      }

      .btn-icon.active {
        background-color: rgba(217, 70, 239, 0.2);
        color: #f0abfc;
      }

      .color-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .color-btn.active {
        border-color: white;
        transform: scale(1.15);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background-color: #10b981;
        color: white;
        padding: 0.875rem 1.5rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        font-weight: 500;
        z-index: 50;
        transform: translateY(150%) scale(0.9);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .toast.show {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      /* Modals */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease-out;
      }

      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-overlay .modal {
        transform: scale(0.95);
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .modal-overlay.active .modal {
        transform: scale(1);
      }

      .modal {
        background-color: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1.25rem;
        padding: 1.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
  </head>
  <body class="selection:bg-fuchsia-500/30">
    <!-- Data injection from Flask -->
    <script id="html-data" type="application/json">
      {{ html_history | tojson | safe }}
    </script>

    <div class="app-container" id="app-root">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2 class="font-semibold text-lg">HTML Diagrams</h2>
          <button class="btn btn-secondary text-xs px-2 py-1" id="btn-new-file">+ New</button>
        </div>
        <div class="sidebar-content" id="file-list">
          <!-- Populated by JS -->
        </div>
        <div class="p-4 border-t border-slate-700">
          {% if is_admin %}
          <a href="{{ url_for('html_page', owner=selected_owner) }}" class="btn btn-secondary w-full">Back to Dashboard</a>
          {% else %}
          <a href="{{ url_for('html_page') }}" class="btn btn-secondary w-full">Back to Dashboard</a>
          {% endif %}
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
          <button class="btn-icon" id="btn-toggle-sidebar" title="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>

          <div class="flex-1 px-2">
            <input type="text" id="file-title-input" class="bg-transparent border-none text-white text-lg font-semibold outline-none w-full placeholder-slate-500" placeholder="Untitled Document" disabled>
          </div>

          <div class="flex items-center gap-2">
            <button class="btn btn-secondary" id="btn-inject" title="Inject Library">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
              Libraries
            </button>
            <button class="btn btn-primary" id="btn-save">Save</button>
            <button class="btn btn-secondary ml-2" id="btn-present" title="Presentation Mode">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              Present
            </button>
          </div>
        </header>

        <!-- Workspace Area -->
        <div class="workspace-area">
          <!-- Editor Panel -->
          <div class="editor-panel" id="editor-panel">
            <div class="bg-slate-800 text-xs text-slate-400 px-4 py-1 border-b border-slate-700 flex justify-between items-center">
              <span>Source Code</span>
            </div>
            <textarea id="code-editor"></textarea>
          </div>

          <!-- Preview Panel -->
          <div class="preview-panel" id="preview-panel">
            <!-- IMPORTANT: DO NOT include allow-same-origin in this sandbox. We are rendering raw user HTML, and allowing same-origin would open the parent context (our entire application) to XSS. -->
            <iframe id="preview-frame" class="preview-iframe" sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-presentation allow-scripts"></iframe>
            <canvas id="drawing-canvas" class="drawing-canvas"></canvas>
          </div>
        </div>

        <!-- Floating Toolbar (Visible in Present Mode) -->
        <div class="floating-toolbar" id="floating-toolbar">
          <button class="btn-icon text-white bg-slate-700 hover:bg-slate-600 mr-2" id="btn-exit-present" title="Exit Presentation">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          </button>

          <div class="h-8 w-px bg-slate-600 mx-1"></div>

          <button class="btn-icon" id="btn-draw-toggle" title="Toggle Drawing">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
          </button>

          <div class="flex items-center gap-1 mx-2" id="color-picker">
            <button class="color-btn active" style="background-color: #ef4444;" data-color="#ef4444"></button>
            <button class="color-btn" style="background-color: #3b82f6;" data-color="#3b82f6"></button>
            <button class="color-btn" style="background-color: #10b981;" data-color="#10b981"></button>
            <button class="color-btn" style="background-color: #eab308;" data-color="#eab308"></button>
            <button class="color-btn" style="background-color: #a855f7;" data-color="#a855f7"></button>
          </div>

          <button class="btn-icon" id="btn-clear-draw" title="Clear Drawing">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </button>
        </div>
      </main>
    </div>

    <!-- Inject Library Modal -->
    <div class="modal-overlay" id="inject-modal">
      <div class="modal">
        <h3 class="text-xl font-semibold mb-4">Inject Library</h3>
        <p class="text-sm text-slate-400 mb-4">Quickly add a script or stylesheet to your current document's &lt;head&gt;.</p>

        <div class="flex flex-col gap-2 mb-6">
          <button class="btn btn-secondary justify-start btn-inject-lib" data-lib="tailwind">
            Tailwind CSS (CDN)

          <button class="btn btn-secondary justify-start btn-inject-lib" data-lib="mermaid">

          </button>
        </div>

        <div class="flex justify-end">
          <button class="btn btn-secondary" id="btn-close-inject">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Saved successfully!</div>

      // Initialization

      document.getElementById('btn-copy-all').addEventListener('click', () => {
        const source = editor.getValue();
        navigator.clipboard.writeText(source).then(() => {
          showToast('Copied to clipboard!');
        });
      });

      document.getElementById('btn-delete-all').addEventListener('click', () => {
        if (confirm('Are you sure you want to clear the entire document?')) {
          editor.setValue('');
        }
      });

      document.getElementById('btn-toggle-public').addEventListener('click', togglePublicLink);
      document.getElementById('btn-share-user').addEventListener('click', shareWithUser);

      const origLoadFile = loadFile;
      loadFile = function(id) {
        origLoadFile(id);
        updateShareModal();
      };

      function getActiveFile() {
        if (!currentFileId) return null;
        return files.find(f => f.id === currentFileId);
      }

      function updateShareModal() {
        const file = getActiveFile();
        if (!file) return;

        const publicBtn = document.getElementById('btn-toggle-public');
        const publicStatus = document.getElementById('public-link-status');
        const publicUrl = document.getElementById('public-link-url');

        if (file.is_public) {
          publicBtn.textContent = 'Disable';
          publicBtn.classList.add('text-red-400');
          publicStatus.textContent = 'Publicly accessible';

          const baseUrl = window.location.origin;
          {% if is_admin %}
          const link = `${baseUrl}/p/html/${file.id}?owner={{ selected_owner }}`;
          {% else %}
          const link = `${baseUrl}/p/html/${file.id}`;
          {% endif %}
          publicUrl.textContent = link;
          publicUrl.classList.remove('hidden');
        } else {
          publicBtn.textContent = 'Enable';
          publicBtn.classList.remove('text-red-400');
          publicStatus.textContent = 'Not shared publicly';
          publicUrl.classList.add('hidden');
        }

        const sharedUsersContainer = document.getElementById('shared-users-list');
        sharedUsersContainer.innerHTML = '';
        if (file.shared_with && file.shared_with.length > 0) {
          file.shared_with.forEach(u => {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between text-xs py-1 text-slate-300';
            div.innerHTML = `
              <span>${u}</span>
              <button class="text-red-400 hover:text-red-300" onclick="unshareUser('${u}')">Revoke</button>
            `;
            sharedUsersContainer.appendChild(div);
          });
        }
      }

      async function togglePublicLink() {
        if (!currentFileId) return;
        const file = getActiveFile();
        const action = file.is_public ? 'disable' : 'enable';

        try {
          const response = await fetch(`/html/public/${currentFileId}/${action}`, {
            method: 'POST',
            headers: {'X-CSRFToken': csrfToken}
          });
          if (response.ok) {
            file.is_public = !file.is_public;
            updateShareModal();
            showToast(`Public link ${file.is_public ? 'enabled' : 'disabled'}`);
          }
        } catch (e) {}
      }

      async function shareWithUser() {
        if (!currentFileId) return;
        const username = document.getElementById('share-username-input').value.trim();
        if (!username) return;

        const formData = new FormData();
        formData.append('share_username', username);

        try {
          const response = await fetch(`/html/share/${currentFileId}`, {
            method: 'POST',
            headers: {'X-CSRFToken': csrfToken},
            body: formData
          });
          if (response.ok) {
            const file = getActiveFile();
            if (!file.shared_with) file.shared_with = [];
            if (!file.shared_with.includes(username)) {
               file.shared_with.push(username);
            }
            document.getElementById('share-username-input').value = '';
            updateShareModal();
            showToast(`Shared with ${username}`);
          }
        } catch (e) {}
      }

      async function unshareUser(username) {
        if (!currentFileId) return;
        const formData = new FormData();
        formData.append('unshare_username', username);
        try {
          const response = await fetch(`/html/unshare/${currentFileId}`, {
            method: 'POST',
            headers: {'X-CSRFToken': csrfToken},
            body: formData
          });
          if (response.ok) {
            const file = getActiveFile();
            file.shared_with = file.shared_with.filter(u => u !== username);
            updateShareModal();
            showToast(`Revoked from ${username}`);
          }
        } catch (e) {}
      }

      // Initialization
      function init() {
        // Init CodeMirror
        editor = CodeMirror.fromTextArea(elements.codeEditor, {
          mode: "htmlmixed",
          theme: "dracula",
          lineNumbers: true,
          lineWrapping: true,
          autoCloseTags: true,
          matchBrackets: true,
          indentUnit: 2,
          tabSize: 2,
        });

        editor.on("change", () => {
          clearTimeout(previewUpdateTimeout);
          previewUpdateTimeout = setTimeout(updatePreview, 500);
        });

        // Load specific file from URL if specified
        const urlParams = new URLSearchParams(window.location.search);
        const fileIdParam = urlParams.get('file_id');

        renderFileList();

        if (fileIdParam) {
            loadFile(fileIdParam);
        } else if (files.length > 0) {
          loadFile(files[0].id);
        } else {
          createNewFile();
        }

        setupEventListeners();
        setupDrawing();
      }

      function renderFileList() {
        elements.fileList.innerHTML = '';

        if (files.length === 0) {
          elements.fileList.innerHTML = '<p class="text-sm text-slate-500 text-center mt-4">No saved diagrams yet.</p>';
          return;
        }

        files.forEach(file => {
          const div = document.createElement('div');
          div.className = `file-item ${file.id === currentFileId ? 'active' : ''}`;

          div.onclick = (e) => {
             // Don't load if clicking delete button
             if(e.target.tagName === 'BUTTON') return;
             loadFile(file.id)
          };

          const title = document.createElement('div');
          title.className = 'file-item-title';
          title.textContent = file.title || file.html_name || 'Untitled Document';

          const meta = document.createElement('div');
          meta.className = 'file-item-meta';
          // Format date basic
          const dateStr = file.updated || file.created;
          const date = new Date(dateStr);
          const dateText = document.createElement('span');
          dateText.textContent = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

          const delBtn = document.createElement('form');
          delBtn.method = 'post';
          {% if is_admin %}
          delBtn.action = `/html/delete/${file.id}?owner={{ selected_owner }}`;
          {% else %}
          delBtn.action = `/html/delete/${file.id}`;
          {% endif %}
          delBtn.innerHTML = `
            <input type="hidden" name="csrf_token" value="${csrfToken}" />
            <button type="submit" class="btn-delete-file" onclick="return confirm('Are you sure you want to delete this page?')">Delete</button>
          `;

          meta.appendChild(dateText);
          meta.appendChild(delBtn);

          div.appendChild(title);
          div.appendChild(meta);
          elements.fileList.appendChild(div);
        });
      }

      function loadFile(id) {
        const file = files.find(f => f.id === id);
        if (!file) return;

        currentFileId = id;
        elements.fileTitleInput.value = file.title || file.html_name || 'Untitled Document';
        elements.fileTitleInput.disabled = false;

        editor.setValue(file.source || '');
        updatePreview();
        renderFileList();
      }

      function createNewFile() {
        currentFileId = null;
        elements.fileTitleInput.value = '';
        elements.fileTitleInput.placeholder = 'Untitled Document';
        elements.fileTitleInput.disabled = false;
        editor.setValue(DEFAULT_HTML);
        updatePreview();
        renderFileList();
      }

      function updatePreview() {
        const source = editor.getValue();
        elements.previewFrame.srcdoc = source;
      }

      function showToast(message) {
        elements.toast.textContent = message;
        elements.toast.classList.add('show');
        setTimeout(() => {
          elements.toast.classList.remove('show');
        }, 3000);
      }

      async function saveCurrentFile() {
        const title = elements.fileTitleInput.value.trim();
        const source = editor.getValue();

        if (!source.trim()) {
          alert('Cannot save an empty document.');
          return;
        }

        const payload = { title, source };
        if (currentFileId) {
          payload.id = currentFileId;
        }

        try {
          {% if is_admin %}
          const url = "{{ url_for('save_html_ipad_viewer', owner=selected_owner) }}";
          {% else %}
          const url = "{{ url_for('save_html_ipad_viewer') }}";
          {% endif %}
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if (data.ok) {
            showToast('Saved successfully!');
            // Update local state
            if (currentFileId) {
              const idx = files.findIndex(f => f.id === currentFileId);
              if (idx !== -1) {
                files[idx] = data.entry;
              }
            } else {
              files.unshift(data.entry);
              currentFileId = data.entry.id;
            }
            renderFileList();
          } else {
            alert('Error saving: ' + (data.error || 'Unknown error'));
          }
        } catch (err) {
          console.error(err);
          alert('Failed to save document. See console for details.');
        }
      }

      // Drawing Logic
      let isDrawingMode = false;
      let isDrawing = false;
      let ctx = elements.drawingCanvas.getContext('2d');
      let drawColor = '#ef4444';
      let drawWidth = 3;

      function resizeCanvas() {
        const rect = elements.previewFrame.getBoundingClientRect();
        elements.drawingCanvas.width = rect.width;
        elements.drawingCanvas.height = rect.height;
      }

      function setupDrawing() {
        window.addEventListener('resize', resizeCanvas);
        // Delay initial resize to ensure layout is done
        setTimeout(resizeCanvas, 100);

        elements.drawingCanvas.addEventListener('mousedown', startDrawing);
        elements.drawingCanvas.addEventListener('mousemove', draw);
        elements.drawingCanvas.addEventListener('mouseup', stopDrawing);
        elements.drawingCanvas.addEventListener('mouseout', stopDrawing);

        // Touch support
        elements.drawingCanvas.addEventListener('touchstart', handleTouchStart, {passive: false});
        elements.drawingCanvas.addEventListener('touchmove', handleTouchMove, {passive: false});
        elements.drawingCanvas.addEventListener('touchend', stopDrawing);
      }

      function getPos(e) {
        const rect = elements.drawingCanvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
          };
        }
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      function startDrawing(e) {
        if (!isDrawingMode) return;
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      }

      function draw(e) {
        if (!isDrawing || !isDrawingMode) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = drawColor;
        ctx.lineWidth = drawWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      }

      function stopDrawing() {
        if (isDrawing) {
            // Draw a single dot if it was just a click
            ctx.lineTo(ctx.currentX + 1, ctx.currentY + 1);
            ctx.stroke();
            ctx.closePath();
            isDrawing = false;
        }
      }

      function handleTouchStart(e) {
        if (isDrawingMode) e.preventDefault();
        startDrawing(e);
      }

      function handleTouchMove(e) {
        if (isDrawingMode) e.preventDefault();
        draw(e);
      }

      function toggleDrawingMode() {
        isDrawingMode = !isDrawingMode;
        if (isDrawingMode) {
          elements.drawingCanvas.classList.add('active');
          elements.btnDrawToggle.classList.add('active');
          resizeCanvas(); // Ensure canvas is sized correctly
        } else {
          elements.drawingCanvas.classList.remove('active');
          elements.btnDrawToggle.classList.remove('active');
        }
      }

      function clearCanvas() {
        ctx.clearRect(0, 0, elements.drawingCanvas.width, elements.drawingCanvas.height);
      }

      // Inject Library Logic
      function injectLibrary(libKey) {
        const snippet = LIBRARY_SNIPPETS[libKey];
        if (!snippet) return;

        const currentCode = editor.getValue();
        // Try to insert before </head>, else before <body>, else at top
        if (currentCode.includes('</head>')) {
          editor.setValue(currentCode.replace('</head>', snippet + '  </head>'));
        } else if (currentCode.includes('<body>')) {
          editor.setValue(currentCode.replace('<body>', snippet + '\n<body>'));
        } else {
          editor.setValue(snippet + '\n' + currentCode);
        }
        elements.injectModal.classList.remove('active');
      }

      // Event Listeners Setup
      function setupEventListeners() {
        elements.btnToggleSidebar.addEventListener('click', () => {
          elements.sidebar.classList.toggle('hidden');
          setTimeout(() => editor.refresh(), 350);
        });

        elements.btnNewFile.addEventListener('click', createNewFile);

        elements.btnSave.addEventListener('click', saveCurrentFile);

        elements.btnPresent.addEventListener('click', () => {
          elements.appRoot.classList.add('presentation-mode');
          elements.sidebar.classList.add('hidden');
          setTimeout(() => {
            resizeCanvas();
            editor.refresh();
          }, 100);
        });

        elements.btnExitPresent.addEventListener('click', () => {
          elements.appRoot.classList.remove('presentation-mode');
          elements.sidebar.classList.remove('hidden');
          // Turn off drawing mode if it was on
          if (isDrawingMode) toggleDrawingMode();
          setTimeout(() => editor.refresh(), 100);
        });

        elements.btnDrawToggle.addEventListener('click', toggleDrawingMode);
        elements.btnClearDraw.addEventListener('click', clearCanvas);

        elements.colorButtons.forEach(btn => {
          btn.addEventListener('click', (e) => {
            elements.colorButtons.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            drawColor = e.target.dataset.color;
          });
        });

        elements.btnInject.addEventListener('click', () => {
          elements.injectModal.classList.add('active');
        });

        elements.btnCloseInject.addEventListener('click', () => {
          elements.injectModal.classList.remove('active');
        });

        elements.btnInjectLibs.forEach(btn => {
          btn.addEventListener('click', (e) => {
            injectLibrary(e.target.dataset.lib);
          });
        });

        // Close modal on click outside
        elements.injectModal.addEventListener('click', (e) => {
          if (e.target === elements.injectModal) {
            elements.injectModal.classList.remove('active');
          }
        });
      }

      // Start App
      init();
    </script>

    <!-- Share Modal -->
    <div id="share-modal" class="modal">
      <div class="modal-box w-11/12 max-w-md">
        <h3 class="font-bold text-lg mb-4 text-slate-800">Share Options</h3>

        <div class="space-y-4">
          <!-- Public Link -->
          <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
            <div class="flex items-center justify-between mb-2">
              <h4 class="font-semibold text-slate-700">Public Link</h4>
              <button id="btn-toggle-public" class="text-sm font-medium text-blue-600 hover:text-blue-700">Enable</button>
            </div>
            <p id="public-link-status" class="text-xs text-slate-500 mb-2">Not shared publicly</p>
            <div id="public-link-url" class="text-xs p-2 bg-white border border-slate-200 rounded break-all hidden select-all text-slate-600"></div>
          </div>

          <!-- Share with User -->
          <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
            <h4 class="font-semibold text-slate-700 mb-2">Share with User</h4>
            <div class="flex gap-2 mb-3">
              <input type="text" id="share-username-input" placeholder="Username" class="input input-bordered input-sm flex-1 text-slate-800" />
              <button id="btn-share-user" class="btn btn-primary btn-sm">Share</button>
            </div>

            <div class="mt-4">
              <h5 class="text-xs font-semibold text-slate-500 uppercase mb-2">Shared With</h5>
              <div id="shared-users-list" class="space-y-1">
                <!-- Users injected here -->
              </div>
            </div>
          </div>
        </div>

        <div class="modal-action">
          <button class="btn btn-sm" onclick="document.getElementById('share-modal').classList.remove('active')">Close</button>
        </div>
      </div>
    </div>

  </body>
</html>
